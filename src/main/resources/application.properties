spring.profiles.active=local
spring.application.name=yoko

# 1. CONEXIÓN A POSTGRESQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/yoko_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

super.admin.username=${SUPER_ADMIN_USERNAME:yokoadmin}
super.admin.password=${SUPER_ADMIN_PASSWORD} 
# 2. JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update

# 3. PGVECTOR
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# 4. LLM (GROQ)
spring.ai.openai.embedding.enabled=false
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.enabled=true

# 5. EMBEDDINGS — multilingual-e5-base (768 dims, ~270MB, requiere prefijos query:/passage:)
spring.ai.embedding.transformer.onnx.modelUri=https://huggingface.co/intfloat/multilingual-e5-base/resolve/main/onnx/model.onnx
spring.ai.embedding.transformer.tokenizer.uri=https://huggingface.co/intfloat/multilingual-e5-base/resolve/main/tokenizer.json

# LOGS
logging.level.com.yoko=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.hibernate.SQL=DEBUG
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.output.ansi.enabled=ALWAYS

# EMAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=polarisagency.creative@gmail.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ENCODING
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

#JWT

application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}